<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行事自動反映くん</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="logo">
                <i data-lucide="calendar-check"></i>
                <h1>行事反映くん</h1>
            </div>
            <button id="settingsBtn" class="icon-btn" title="APIキー設定">
                <i data-lucide="settings"></i>
            </button>
        </header>

        <main class="content">
            <!-- ========== Calendar View ========== -->
            <div id="calendarView" class="view">
                <div class="calendar-header">
                    <button id="prevMonth" class="icon-btn"><i data-lucide="chevron-left"></i></button>
                    <h2 id="currentMonthLabel">2026年 3月</h2>
                    <button id="nextMonth" class="icon-btn"><i data-lucide="chevron-right"></i></button>
                </div>
                
                <div class="calendar-weekdays">
                    <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
                </div>
                
                <div id="calendarGrid" class="calendar-grid">
                    <!-- Days injected by JS -->
                </div>
            </div>

            <!-- ========== Scan View ========== -->
            <div id="scanView" class="view hidden">
                <!-- Instruction -->
                <div class="card intro-card">
                    <h2>プリントから予定を作成</h2>
                    <p>スマホのカメラで学校のプリントを撮影するだけで、自動で予定を読み取ります。</p>
                </div>

                <!-- Upload Section -->
                <div class="upload-section">
                    <input type="file" id="imageInput" accept="image/*" capture="environment" class="hidden-input">
                    <label for="imageInput" class="upload-btn primary-btn pulse-anim">
                        <i data-lucide="camera"></i>
                        <span>プリントを撮影・選択</span>
                    </label>
                </div>

                <!-- Preview Image -->
                <div id="imagePreviewContainer" class="hidden">
                    <img id="imagePreview" src="" alt="Selected document">
                </div>

                <!-- Loading State -->
                <div id="loadingState" class="hidden loading-container">
                    <div class="spinner"></div>
                    <p>AIがプリントを解析中...<br><span class="text-sm text-gray">少し時間がかかる場合があります</span></p>
                </div>

                <!-- Results Container (Dynamically Populated) -->
                <div id="resultsContainer" class="hidden slide-up">
                    <!-- Event cards will be injected here by app.js -->
                </div>
            </div>
            
            <div id="errorToast" class="toast hidden"></div>
        </main>

        <!-- ========== Event Detail Modal ========== -->
        <div id="eventModal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">予定の詳細</h2>
                    <button id="modalCloseBtn" class="icon-btn modal-close-btn">
                        <i data-lucide="x"></i>
                    </button>
                </div>

                <!-- View Mode -->
                <div id="modalViewMode">
                    <div class="modal-detail-list">
                        <div class="modal-detail-item">
                            <i data-lucide="type"></i>
                            <div>
                                <span class="detail-label">タイトル</span>
                                <span id="viewTitle" class="detail-value"></span>
                            </div>
                        </div>
                        <div class="modal-detail-item">
                            <i data-lucide="clock"></i>
                            <div>
                                <span class="detail-label">開始</span>
                                <span id="viewStart" class="detail-value"></span>
                            </div>
                        </div>
                        <div class="modal-detail-item">
                            <i data-lucide="clock-4"></i>
                            <div>
                                <span class="detail-label">終了</span>
                                <span id="viewEnd" class="detail-value"></span>
                            </div>
                        </div>
                        <div class="modal-detail-item">
                            <i data-lucide="map-pin"></i>
                            <div>
                                <span class="detail-label">場所</span>
                                <span id="viewLocation" class="detail-value"></span>
                            </div>
                        </div>
                        <div class="modal-detail-item">
                            <i data-lucide="align-left"></i>
                            <div>
                                <span class="detail-label">詳細・持ち物</span>
                                <span id="viewDesc" class="detail-value"></span>
                            </div>
                        </div>
                    </div>
                    <button id="modalGcalBtn" class="modal-action-btn gcal-btn full-width-btn">
                        <i data-lucide="calendar-plus"></i>
                        <span>Googleカレンダーに追加</span>
                    </button>
                    <div class="modal-actions">
                        <button id="modalEditBtn" class="modal-action-btn edit-btn">
                            <i data-lucide="pencil"></i>
                            <span>編集</span>
                        </button>
                        <button id="modalDeleteBtn" class="modal-action-btn delete-btn">
                            <i data-lucide="trash-2"></i>
                            <span>削除</span>
                        </button>
                    </div>
                </div>

                <!-- Edit Mode -->
                <div id="modalEditMode" class="hidden">
                    <div class="form-group">
                        <label><i data-lucide="type"></i> タイトル</label>
                        <input type="text" id="editTitle" placeholder="例: 入学式">
                    </div>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label><i data-lucide="clock"></i> 開始</label>
                            <input type="datetime-local" id="editStart">
                        </div>
                        <div class="form-group">
                            <label><i data-lucide="clock-4"></i> 終了</label>
                            <input type="datetime-local" id="editEnd">
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i data-lucide="map-pin"></i> 場所</label>
                        <input type="text" id="editLocation" placeholder="例: 体育館">
                    </div>
                    <div class="form-group">
                        <label><i data-lucide="align-left"></i> 詳細・持ち物</label>
                        <textarea id="editDesc" rows="3" placeholder="水筒、上履きなど"></textarea>
                    </div>
                    <div class="modal-actions">
                        <button id="modalSaveBtn" class="modal-action-btn save-btn">
                            <i data-lucide="check-circle"></i>
                            <span>保存</span>
                        </button>
                        <button id="modalCancelBtn" class="modal-action-btn cancel-btn">
                            <i data-lucide="arrow-left"></i>
                            <span>戻る</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="calendarView">
                <i data-lucide="calendar"></i>
                <span>カレンダー</span>
            </button>
            <button class="nav-item" data-target="scanView">
                <i data-lucide="scan-line"></i>
                <span>読み取り追加</span>
            </button>
        </nav>
    </div>

    <!-- Script references -->
    <script src="app.js"></script>
    
    <!-- Register Service Worker for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
